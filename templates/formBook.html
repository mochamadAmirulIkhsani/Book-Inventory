{{ template "header.html" . }}

<section class="section">
    {{ if.payload }}
       <form action="/updateBook/{{.payload.ID}}" method="post">
        {{ else }}
        <form action="/book" method="post">
        {{ end }}

        <div class="container" style="max-width: 480px; border: 1px solid #ccc; padding: 20px; border-radius: 8px;">
            {{ if .content }}
            <div class="alert alert-danger" role="alert">
                {{ .content }}
            </div>
            {{ end }}

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" type="text" name="title" placeholder="Enter book title" value="{{.payload.Title}}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Author</label>
                <input class="form-control" type="text" name="author" placeholder="Enter book author" value="{{.payload.Author}}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" placeholder="Enter book description" value="{{.payload.Description}}" required>Descrption</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input class="form-control" type="number" name="stock" placeholder="Enter book stock" value="{{.payload.Stock}}" required>
            </div>

            <div class="field" style="display: none;">
                <label class="label" >Auth</label>
                <div class="control" >
                    <input class="hidden" type="text" placeholder="Enter Auth" name="auth" value="{{.auth}}" required>
                </div>
            </div>

            {{ if.payload }}
            <button type="submit" class="btn btn-primary">Update Book</button>
            {{ else }}
            <button type="submit" class="btn btn-primary">Add Book</button>
            {{ end }}

        </div>
       </form>
</section>

{{ template "footer.html" . }}

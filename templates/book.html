{{ template "header.html" . }}

<div class="py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                        <div>
                            <span class="badge text-bg-primary rounded-pill px-3 py-2 mb-3">Book #{{.payload.ID}}</span>
                            <h1 class="display-6 fw-bold mb-2">{{.payload.Title}}</h1>
                            <p class="text-muted mb-0">Penulis: {{.payload.Author}}</p>
                        </div>

                        <div class="text-end">
                            <div class="small text-uppercase text-muted mb-1">Stock tersedia</div>
                            <div class="display-6 fw-bold text-success">{{.payload.Stock}}</div>
                        </div>
                    </div>

                    <div class="p-4 bg-light rounded-4 mb-4">
                        <h2 class="h5 fw-semibold mb-3">Deskripsi</h2>
                        <p class="text-secondary mb-0 lh-lg">{{.payload.Description}}</p>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3">
                        <form action="/updateBook/{{.payload.ID}}" method="get" class="m-0">
                            <input type="hidden" name="auth" value="{{.auth}}">
                            <button type="submit" class="btn btn-primary btn-lg px-4 rounded-pill">Update</button>
                        </form>

                        <form action="/deleteBook/{{.payload.ID}}" method="post" class="m-0" onsubmit="return confirm('Hapus buku ini?');">
                            <input type="hidden" name="auth" value="{{.auth}}">
                            <button type="submit" class="btn btn-outline-danger btn-lg px-4 rounded-pill">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{{ template "footer.html" . }}
